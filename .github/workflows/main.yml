name: Flutter Manual Build (All Platforms)

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Build Android
        run: |
          flutter build apk --release
          flutter build appbundle --release
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Build Web
        run: flutter build web --release
      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/

  build-macos:
    name: macOS Desktop
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Build macOS
        run: flutter build macos --release
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-desktop
          path: build/macos/Build/Products/Release/Runner.app

  build-ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Build iOS
        run: flutter build ios --release --no-codesign
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app

  build-windows:
    name: Windows Desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop
          path: build/windows/x64/runner/Release/

  build-linux:
    name: Linux Desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libx11-dev libxtst-dev libxext-dev libxkbcommon-dev libgl1-mesa-dev
      - run: flutter pub get
      - name: Build Linux
        run: flutter build linux --release
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop
          path: build/linux/x64/release/bundle/
